<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kashish Portfolio</title>

<style>

/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Header */
header {
    background: #1e1e2f;
    color: white;
    padding: 15px 40px;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav a {
    color: white;
    text-decoration: none;
}

nav a:hover {
    color: #00adb5;
}

/* Hero Section */
.hero {
    text-align: center;
    padding: 40px;
}

.hero img {
    width: 150px;
    border-radius: 50%;
    margin-bottom: 15px;
}

/* Projects */
.projects {
    display: flex;
    gap: 20px;
    padding: 40px;
    justify-content: center;
}

.card {
    background: #f5f5f5;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
    transition: transform 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: #1e1e2f;
    color: white;
}

/* Responsive */
@media (max-width: 768px) {
    nav ul {
        flex-direction: column;
    }

    .projects {
        flex-direction: column;
        align-items: center;
    }
}

</style>
</head>
<body>

<header>
    <nav>
        <h2>Kashish</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <img src="https://via.placeholder.com/150" alt="Profile">
    <h1>Hello, I'm Kashish 👋</h1>
    <p>Computer Science Student | Future Software Developer</p>
</section>

<section class="projects">
    <div class="card">
        <h3>TripMate</h3>
        <p>Student travel planner platform.</p>
    </div>
    <div class="card">
        <h3>CU Verse</h3>
        <p>Instagram-like social platform.</p>
    </div>
    <div class="card">
        <h3>FREEKARO</h3>
        <p>Rental goods and services website.</p>
    </div>
</section>

<footer>
    <p>© 2026 Kashish Singh</p>
</footer>

</body>
</html>
