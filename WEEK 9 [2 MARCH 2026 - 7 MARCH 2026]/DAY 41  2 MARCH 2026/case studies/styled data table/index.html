<!DOCTYPE html>
<html>
<head>
<title>Student Grades</title>
<style>

body {
    font-family: Arial;
    padding: 40px;
}

table {
    width: 80%;
    border-collapse: collapse;
    margin: auto;
}

caption {
    font-size: 22px;
    margin-bottom: 15px;
    font-weight: bold;
}

th, td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
}

th {
    background: #0077b6;
    color: white;
}

tr:nth-child(even) {
    background: #f2f2f2;
}

tr:hover {
    background: #90e0ef;
}

</style>
</head>
<body>

<table>
    <caption>Student Marks Table</caption>
    <tr>
        <th>Name</th>
        <th>Subject</th>
        <th>Marks</th>
        <th>Grade</th>
    </tr>
    <tr>
        <td>Kashish</td>
        <td>DBMS</td>
        <td>92</td>
        <td>A</td>
    </tr>
    <tr>
        <td>Riya</td>
        <td>OS</td>
        <td>85</td>
        <td>B+</td>
    </tr>
    <tr>
        <td>Rahul</td>
        <td>CN</td>
        <td>78</td>
        <td>B</td>
    </tr>
</table>

</body>
</html>
