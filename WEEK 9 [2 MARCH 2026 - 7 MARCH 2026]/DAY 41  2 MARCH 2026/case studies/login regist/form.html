<!DOCTYPE html>
<html>
<head>
<title>Login Form</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.form-card {
    background: white;
    padding: 30px;
    width: 320px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input:focus {
    border-color: #667eea;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #5a67d8;
}

</style>
</head>
<body>

<div class="form-card">
    <h2>Register</h2>
    <label>Username</label>
    <input type="text" placeholder="Enter username">

    <label>Email</label>
    <input type="email" placeholder="Enter email">

    <label>Password</label>
    <input type="password" placeholder="Enter password">

    <button>Sign Up</button>
</div>

</body>
</html>
